name: Bug report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this. Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, language/runtime version, branch or commit"
      placeholder: "e.g. macOS 14, Python 3.12, branch: main"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
